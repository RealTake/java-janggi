version: "3.9"
services:
  db:
    image: mysql:8.0.28
    platform: linux/x86_64
    restart: on-failure
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: janggi
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      TZ: Asia/Seoul
    command: --bind-address=0.0.0.0
    volumes:
      - ./production/db/mysql/data:/var/lib/mysql
      - ./production/db/mysql/init:/docker-entrypoint-initdb.d
