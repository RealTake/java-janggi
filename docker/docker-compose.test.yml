version: '3.8'
services:
  test-db:
    image: mysql:8.0
    container_name: janggi-test-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: janggi_test
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    volumes:
      - ./docker/db/mysql/test-data/init-test.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
